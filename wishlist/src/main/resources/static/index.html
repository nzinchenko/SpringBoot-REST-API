<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій список бажань</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .add-form {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .add-form input {
            padding: 12px 15px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .add-form input:focus {
            border-color: #9932CC;
        }

        .btn-primary {
            padding: 12px 24px;
            background-color: #8B008B;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-primary:hover {
            background-color: #8B008B;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        #loading {
            display: none;
            text-align: center;
            margin-bottom: 20px;
            color: #8B008B;
            font-weight: bold;
        }

        #itemsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .card-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            margin-top: 5px;
            color: #2c3e50;
            padding-right: 65px;
            line-height: 1.4;
            flex-grow: 1;
        }

        .link-btn {
            display: inline-block;
            text-align: center;
            text-decoration: none;
            color: #fff;
            background-color: #8B008B;
            padding: 10px 15px;
            border-radius: 8px;
            transition: background-color 0.2s;
            font-weight: bold;
            font-size: 15px;
        }

        .link-btn:hover {
            background-color: #9932CC;
        }

        /* НОВІ СТИЛІ ДЛЯ КНОПОК РЕДАГУВАННЯ/ВИДАЛЕННЯ */
        .card-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 5px;
        }

        .btn-action {
            border: none;
            background: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action .icon {
            width: 20px;
            height: 20px;
            fill: #a0a0a0;
            transition: fill 0.2s;
        }

        .btn-action:hover {
            background-color: #f0f4f8;
        }

        .btn-action.edit:hover .icon {
            fill: #42a5f5;
        }

        .btn-action.delete:hover .icon {
            fill: #ef5350;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎁 Мій список бажань</h1>

    <div class="add-form">
        <input type="text" id="urlInput" placeholder="Вставте посилання на товар сюди...">
        <button class="btn-primary" onclick="addItem()">Додати</button>
    </div>

    <div id="loading">Завантаження... ⏳</div>

    <div id="itemsGrid">
    </div>
</div>

<script>
    const apiUrl = 'http://localhost:8080/api/items';

    async function fetchItems() {
        try {
            const response = await fetch(apiUrl);
            const items = await response.json();
            renderItems(items);
        } catch (error) {
            console.error('Помилка завантаження:', error);
            alert('Не вдалося з\'єднатися з сервером. Переконайтеся, що бекенд запущено.');
        }
    }

    function renderItems(items) {
        const grid = document.getElementById('itemsGrid');
        grid.innerHTML = '';

        if (items.length === 0) {
            grid.innerHTML = '<p style="text-align: center; color: #777; grid-column: 1 / -1;">Ваш список бажань поки що порожній. Додайте перше посилання!</p>';
            return;
        }

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';

            const displayTitle = item.title ? item.title : 'Без назви';
            const safeTitle = displayTitle.replace(/'/g, "\\'");

            card.innerHTML = `
                <div class="card-actions">
                    <button class="btn-action edit" onclick="editItem(${item.id}, '${safeTitle}')" title="Редагувати назву">
                        <svg viewBox="0 0 24 24" class="icon"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </button>
                    <button class="btn-action delete" onclick="deleteItem(${item.id})" title="Видалити товар">
                        <svg viewBox="0 0 24 24" class="icon"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                </div>

                <div class="card-title" title="${displayTitle}">${displayTitle}</div>
                <a href="${item.productUrl}" target="_blank" class="link-btn">Перейти до товару 🛒</a>
            `;
            grid.appendChild(card);
        });
    }

    async function editItem(id, currentTitle) {
        const promptDefault = currentTitle === 'Без назви' ? '' : currentTitle;
        const newTitle = prompt('Введіть нову назву товару:', promptDefault);

        if (newTitle === null || newTitle.trim() === '' || newTitle.trim() === currentTitle) {
            return;
        }

        try {
            await fetch(`${apiUrl}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ newTitle: newTitle.trim() })
            });

            fetchItems();
        } catch (error) {
            console.error('Помилка:', error);
            alert('Не вдалося оновити товар.');
        }
    }

    async function deleteItem(id) {
        if (!confirm('Ви впевнені, що хочете видалити цей товар?')) {
            return;
        }

        try {
            await fetch(`${apiUrl}/${id}`, {
                method: 'DELETE'
            });

            fetchItems();
        } catch (error) {
            console.error('Помилка:', error);
            alert('Не вдалося видалити товар.');
        }
    }

    async function addItem() {
        const input = document.getElementById('urlInput');
        const url = input.value.trim();
        const loading = document.getElementById('loading');

        if (!url) {
            alert('Будь ласка, вставте посилання!');
            return;
        }

        loading.style.display = 'block';

        try {
            await fetch(`${apiUrl}/add?url=${encodeURIComponent(url)}`, {
                method: 'POST'
            });

            input.value = '';
            fetchItems();
        } catch (error) {
            console.error('Помилка:', error);
            alert('Не вдалося додати товар.');
        } finally {
            loading.style.display = 'none';
        }
    }

    fetchItems();
</script>

</body>
</html>
